<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-container">

    <div class="modal-header">
      <div class="modal-title">
        <span class="paw-icon">🐾</span>
        <h2>Editar reporte</h2>
      </div>
      <button class="btn-close" (click)="onCerrar()" aria-label="Cerrar">✕</button>
    </div>

    <div class="modal-body">

      @if (errorMessage) {
        <div class="error-banner">
          <span>⚠️</span> {{ errorMessage }}
        </div>
      }

      <!-- Título -->
      <div class="field-group">
        <label for="titulo">Título <span class="required">*</span></label>
        <input
          id="titulo"
          type="text"
          [(ngModel)]="form.titulo"
          placeholder="Ej: Perro perdido en Barrio Centro"
          maxlength="100"
        />
      </div>

      <!-- Descripción -->
      <div class="field-group">
        <label for="descripcion">Descripción <span class="required">*</span></label>
        <textarea
          id="descripcion"
          [(ngModel)]="form.descripcion"
          placeholder="Describí las características de la mascota..."
          rows="4"
          maxlength="500"
        ></textarea>
      </div>

      <!-- Tipo -->
      <div class="field-group">
        <label for="tipo">Tipo <span class="required">*</span></label>
        <select id="tipo" [(ngModel)]="form.tipo">
          <option [value]="PostType.PERDIDA">🔍 Perdida</option>
          <option [value]="PostType.ENCONTRADA">🏠 Encontrada</option>
          <option [value]="PostType.ADOPCION">❤️ En adopción</option>
        </select>
      </div>

      <!-- Ubicación -->
      <div class="field-group">
        <label for="ubicacion">Ubicación <span class="required">*</span></label>
        <input
          id="ubicacion"
          type="text"
          [(ngModel)]="form.ubicacion"
          placeholder="Ej: Av. Colón 1200, Córdoba"
        />
      </div>

     
        
      

    </div>

    <div class="modal-footer">
      <button class="btn-cancelar" (click)="onCerrar()" [disabled]="guardando">
        Cancelar
      </button>
      <button class="btn-guardar" (click)="onGuardar()" [disabled]="guardando">
        @if (guardando) {
          <span class="spinner"></span> Guardando...
        } @else {
          ✓ Guardar cambios
        }
      </button>
    </div>

  </div>
</div>
