<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <div class="logo-icon">🐾</div>
      <h2>Crear Cuenta</h2>
      <p>Unite a nuestra comunidad</p>
    </div>

    <div class="register-body">
      <div *ngIf="successMessage" class="alert-custom alert-success">
        <i class="bi bi-check-circle"></i>
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert-custom alert-error">
        <i class="bi bi-exclamation-circle"></i>
        {{ errorMessage }}
      </div>

      <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">
        <div class="input-group-custom">
          <i class="bi bi-person input-icon"></i>
          <input 
            type="text" 
            class="input-field" 
            formControlName="nombre"
            placeholder="Nombre completo">
          <div class="error-message" *ngIf="nombre?.invalid && nombre?.touched">
            Nombre requerido (mínimo 3 caracteres)
          </div>
        </div>

        <div class="input-group-custom">
          <i class="bi bi-envelope input-icon"></i>
          <input 
            type="email" 
            class="input-field" 
            formControlName="email"
            placeholder="Correo electrónico">
          <div class="error-message" *ngIf="email?.invalid && email?.touched">
            Email válido requerido
          </div>
        </div>

        <div class="input-group-custom">
          <i class="bi bi-lock input-icon"></i>
          <input 
            type="password" 
            class="input-field" 
            formControlName="password"
            placeholder="Contraseña">
          <div class="error-message" *ngIf="password?.invalid && password?.touched">
            Mínimo 4 caracteres
          </div>
        </div>

        <div class="input-group-custom">
          <i class="bi bi-phone input-icon"></i>
          <input 
            type="tel" 
            class="input-field" 
            formControlName="telefono"
            placeholder="Teléfono (opcional)">
        </div>

        <button type="submit" class="btn-register" [disabled]="registroForm.invalid || loading">
          <span *ngIf="!loading">Registrarse</span>
          <div *ngIf="loading" class="spinner"></div>
        </button>
      </form>

      <div class="register-footer">
        <p>¿Ya tenés cuenta? <a routerLink="/login">Iniciar Sesión</a></p>
      </div>
    </div>
  </div>
</div>
