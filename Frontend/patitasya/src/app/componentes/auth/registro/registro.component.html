<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">🐾 Crear Cuenta - PatitasYa</h4>
        </div>
        <div class="card-body">
          <!-- Mensajes -->
          <div *ngIf="successMessage" class="alert alert-success">
            <i class="bi bi-check-circle-fill"></i> {{ successMessage }}
          </div>
          <div *ngIf="errorMessage" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMessage }}
          </div>

          <!-- Formulario de registro -->
          <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Nombre completo *</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="nombre"
                [class.is-invalid]="nombre?.invalid && nombre?.touched">
              <div class="invalid-feedback" *ngIf="nombre?.invalid && nombre?.touched">
                <span *ngIf="nombre?.errors?.['required']">El nombre es requerido</span>
                <span *ngIf="nombre?.errors?.['minlength']">Mínimo 3 caracteres</span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Correo electrónico *</label>
              <input 
                type="email" 
                class="form-control" 
                formControlName="email"
                [class.is-invalid]="email?.invalid && email?.touched">
              <div class="invalid-feedback" *ngIf="email?.invalid && email?.touched">
                <span *ngIf="email?.errors?.['required']">El email es requerido</span>
                <span *ngIf="email?.errors?.['email']">Ingresá un email válido</span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña *</label>
              <input 
                type="password" 
                class="form-control" 
                formControlName="password"
                [class.is-invalid]="password?.invalid && password?.touched">
              <div class="invalid-feedback" *ngIf="password?.invalid && password?.touched">
                <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
                <span *ngIf="password?.errors?.['minlength']">Mínimo 4 caracteres</span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Teléfono (opcional)</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="telefono">
            </div>

            <button 
              type="submit" 
              class="btn btn-success w-100"
              [disabled]="registroForm.invalid || loading">
              <span *ngIf="!loading">Registrarse</span>
              <span *ngIf="loading">
                <span class="spinner-border spinner-border-sm me-2"></span>
                Registrando...
              </span>
            </button>
          </form>

          <div class="mt-3 text-center">
            <a routerLink="/login">¿Ya tenés cuenta? Iniciar Sesión</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
